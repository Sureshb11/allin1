<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
.glass-effect {
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px)
    }
.kinetic-gradient {
    background: linear-gradient(135deg, #0052ff 0%, #b7c4ff 100%)
    }
.bg-stadium {
    background-image: linear-gradient(to bottom, rgba(15, 19, 31, 0.4), rgba(15, 19, 31, 1)), url(https://lh3.googleusercontent.com/aida-public/AB6AXuD18SflrdIGp2C104Ajm_1eWXMNaNux4r6g1NLsX8hqeqTOTy1iXuolQ71wCMHGDqC7ZigCJzrE8lBIp6fViKLVX0I8IMLBuRyKEKIqWj9lDxC6tN6H3aDOjJ0eB7MdSbE0agYbc7fNXHs-gp9FIxzMI-WLLmDHjbW1OfT1tZloD-2yxZet1k7UQ1iFxSBYxYk_Hr1wZHoPgyXaYD8sI1a9GPmvkJxmtOl0bvKl-GmUf7tSEUrmcOaEq9NGPWM3SpoI-8Q5Xx2IX98);
    background-size: cover;
    background-position: center
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col items-center overflow-x-hidden">
<!-- Top Navigation Bar -->
<header class="w-full flex items-center justify-between px-6 py-6 z-10">
<!-- Brand Logo -->
<div class="flex items-center gap-3">
<div class="bg-[#abd600] w-8 h-8 flex items-center justify-center rounded-sm">
<span class="material-symbols-outlined text-white text-xl" data-icon="star_rate" style="font-variation-settings: 'FILL' 1;">star_rate</span>
</div>
<div class="flex items-center gap-2 font-headline font-black italic tracking-tighter text-xl">
<span class="text-white">LOCAL</span>
<span class="bg-[#abd600] text-white px-2 py-0.5 rounded-sm">LEGENDS</span>
</div>
</div>
<div class="hidden md:flex gap-6 font-headline text-xs font-bold uppercase tracking-widest text-on-surface-variant">
<a class="hover:text-primary transition-colors" href="#">Support</a>
<a class="hover:text-primary transition-colors" href="#">About</a>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center w-full max-w-7xl px-4 py-8 md:py-20 relative">
<!-- Background Decor -->
<div class="absolute inset-0 bg-stadium -z-10 opacity-40" data-alt="dramatic wide angle of a professional football stadium under intense floodlights at night with cool atmospheric haze"></div>
<div class="absolute -top-20 -left-20 w-96 h-96 bg-primary-container/20 blur-[120px] rounded-full -z-10"></div>
<div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-tertiary-container/10 blur-[150px] rounded-full -z-10"></div>
<div class="w-full max-w-md space-y-12">
<!-- Hero Heading Section -->
<div class="space-y-4">
<div class="flex items-center gap-2 text-tertiary font-headline text-xs font-bold uppercase tracking-[0.2em]">
<span class="w-12 h-1 bg-tertiary"></span>
                    Live Updates
                </div>
<h1 class="text-6xl md:text-7xl font-black font-headline italic tracking-tighter leading-none text-on-surface">
                    GET INTO THE <span class="text-transparent bg-clip-text kinetic-gradient">ACTION</span>
</h1>
<p class="text-on-surface-variant text-lg font-medium max-w-sm">
                    Enter your mobile number to receive a one-time password and join the arena.
                </p>
</div>
<!-- Login Card -->
<div class="surface-container-high p-8 rounded-xl space-y-8 glass-effect bg-surface-container-high/60 shadow-[0_20px_40px_rgba(0,0,0,0.4)]">
<div class="space-y-6">
<!-- Input Group -->
<div class="space-y-2 group">
<label class="block text-[10px] font-bold font-headline uppercase tracking-widest text-on-surface-variant group-focus-within:text-tertiary transition-colors">
                            Phone Number
                        </label>
<div class="flex items-center gap-4 border-b-2 border-surface-container-highest group-focus-within:border-primary transition-all duration-300 pb-2">
<!-- Country Code Selection -->
<div class="flex items-center gap-1 cursor-pointer hover:bg-surface-bright p-1 rounded transition-colors">
<span class="text-on-surface font-bold font-headline text-lg">+1</span>
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="expand_more">expand_more</span>
</div>
<input class="bg-transparent border-none focus:ring-0 w-full text-xl font-bold font-headline placeholder:text-on-surface-variant/30 text-on-surface p-0" placeholder="000 000 0000" type="tel"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full group relative overflow-hidden kinetic-gradient p-[1px] rounded-md active:scale-95 transition-transform">
<div class="bg-primary-container text-on-primary-container flex items-center justify-center gap-2 py-4 px-8 rounded-md font-headline font-bold uppercase tracking-widest text-sm group-hover:bg-transparent transition-colors">
                            SEND OTP
                            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="bolt" data-weight="fill" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
</button>
</div>
<!-- Secondary Actions -->
</div>
<!-- Footer Meta -->
<p class="text-center text-[10px] text-on-surface-variant/60 font-medium uppercase tracking-widest leading-loose">By continuing, you agree to Local Legends' <br/>
<a class="text-primary underline underline-offset-4 decoration-primary/30" href="#">Terms of Service</a> &amp; <a class="text-primary underline underline-offset-4 decoration-primary/30" href="#">Privacy Policy</a></p>
</div>
</main>
<!-- Momentum Decorative Element (Visual only for login) -->
<div class="fixed bottom-0 left-0 w-full h-1 flex">
<div class="w-2/3 h-full bg-tertiary"></div>
<div class="w-1/3 h-full bg-secondary"></div>
</div>
<!-- Background Grid Texture (Subtle) -->
<div class="fixed inset-0 pointer-events-none -z-20 opacity-[0.03]" style="background-image: radial-gradient(#dfe2f3 1px, transparent 0); background-size: 40px 40px;"></div>
</body></html>
